[project]
name = "job-filter-web"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
  "job-filter-core",
]

[tool.uv.sources]
job-filter-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/job_filter_web"]
